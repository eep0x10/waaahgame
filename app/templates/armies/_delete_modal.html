{# Delete confirmation modal. Variable: army (Army) #}
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <h2 class="modal-title">Delete Army</h2>
    <p class="modal-body">
      Are you sure you want to permanently delete <strong>{{ army.name }}</strong>?
      This cannot be undone.
    </p>
    <div class="modal-actions">
      <form method="POST" action="{{ url_for('armies.delete', army_id=army.id) }}">
        <button type="submit" class="btn-danger">Delete</button>
      </form>
      <button type="button" class="btn-secondary" onclick="document.getElementById('delete-modal').remove()">Cancel</button>
    </div>
  </div>
</div>
