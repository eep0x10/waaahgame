{% extends "base.html" %}
{% block title %}Unidades — waaahgame{% endblock %}

{% block content %}
<section class="factions-section">
  <div class="container">
    <div class="factions-header">
      <p class="eyebrow">O Arquivo de Warscrolls</p>
      <h1 class="section-title">Todas as Unidades</h1>
    </div>

    <form id="unit-filter-form"
          class="filter-bar"
          hx-get="{{ url_for('units.index') }}"
          hx-target="#unit-results"
          hx-swap="innerHTML"
          hx-trigger="change from:select, keyup changed delay:400ms from:input[type=text], keyup changed delay:400ms from:input[type=number], change from:input[type=checkbox]">

      <div class="filter-field filter-field--system">
        <label class="filter-field-label" for="filter-system">Sistema</label>
        <select id="filter-system" name="system" class="form-select">
          <option value="" {% if not system_filter %}selected{% endif %}>Todos os Sistemas</option>
          {% for sys in systems %}
            <option value="{{ sys.code }}" {% if system_filter == sys.code %}selected{% endif %}>{{ sys.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-field filter-field--faction">
        <label class="filter-field-label" for="filter-faction">Facção</label>
        <select id="filter-faction" name="faction" class="form-select">
          <option value="" {% if not faction_filter %}selected{% endif %}>Todas as Facções</option>
          {% for fac in factions %}
            <option value="{{ fac.slug }}" {% if faction_filter == fac.slug %}selected{% endif %}>{{ fac.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-field filter-field--search">
        <label class="filter-field-label" for="filter-q">Buscar</label>
        <input id="filter-q" type="text" name="q" value="{{ q or '' }}"
               placeholder="Nome da unidade…" class="form-input">
      </div>

      <div class="filter-field filter-field--pts">
        <label class="filter-field-label" for="filter-pts-min">Pts mín</label>
        <input id="filter-pts-min" type="number" name="pts_min" value="{{ pts_min or '' }}"
               placeholder="0" class="form-input">
      </div>

      <div class="filter-field filter-field--pts">
        <label class="filter-field-label" for="filter-pts-max">Pts máx</label>
        <input id="filter-pts-max" type="number" name="pts_max" value="{{ pts_max or '' }}"
               placeholder="∞" class="form-input">
      </div>

      <label class="filter-toggle">
        <input type="checkbox" name="only_incomplete" value="1"
               {% if only_incomplete %}checked{% endif %}>
        <span class="chip-q">?</span>
        Apenas incompletos
      </label>
    </form>

    <div id="unit-results">
      {% include 'units/_unit_rows.html' %}
    </div>

  </div>
</section>
{% endblock %}
