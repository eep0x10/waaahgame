{% extends "base.html" %}
{% block title %}Units — waaahgame{% endblock %}

{% block content %}
<section class="factions-section">
  <div class="container">
    <div class="factions-header">
      <p class="eyebrow">The Warscroll Archive</p>
      <h1 class="section-title">All Units</h1>
    </div>

    <!-- Filter Form -->
    <form id="unit-filter-form"
          hx-get="{{ url_for('units.index') }}"
          hx-target="#unit-results"
          hx-swap="innerHTML"
          hx-trigger="change from:select, keyup changed delay:400ms from:input[type=text], keyup changed delay:400ms from:input[type=number]"
          style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;align-items:flex-end;">

      <div>
        <label style="display:block;font-size:0.75rem;letter-spacing:0.08em;opacity:0.6;margin-bottom:0.25rem;">SYSTEM</label>
        <select name="system" class="form-select" style="min-width:130px;">
          <option value="" {% if not system_filter %}selected{% endif %}>All Systems</option>
          {% for sys in systems %}
            <option value="{{ sys.code }}" {% if system_filter == sys.code %}selected{% endif %}>{{ sys.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label style="display:block;font-size:0.75rem;letter-spacing:0.08em;opacity:0.6;margin-bottom:0.25rem;">FACTION</label>
        <select name="faction" class="form-select" style="min-width:160px;">
          <option value="" {% if not faction_filter %}selected{% endif %}>All Factions</option>
          {% for fac in factions %}
            <option value="{{ fac.slug }}" {% if faction_filter == fac.slug %}selected{% endif %}>{{ fac.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label style="display:block;font-size:0.75rem;letter-spacing:0.08em;opacity:0.6;margin-bottom:0.25rem;">SEARCH</label>
        <input type="text" name="q" value="{{ q or '' }}" placeholder="Unit name…"
               class="form-input" style="min-width:180px;">
      </div>

      <div>
        <label style="display:block;font-size:0.75rem;letter-spacing:0.08em;opacity:0.6;margin-bottom:0.25rem;">MIN PTS</label>
        <input type="number" name="pts_min" value="{{ pts_min or '' }}" placeholder="0"
               class="form-input" style="width:80px;">
      </div>

      <div>
        <label style="display:block;font-size:0.75rem;letter-spacing:0.08em;opacity:0.6;margin-bottom:0.25rem;">MAX PTS</label>
        <input type="number" name="pts_max" value="{{ pts_max or '' }}" placeholder="∞"
               class="form-input" style="width:80px;">
      </div>
    </form>

    <div id="unit-results">
      {% include 'units/_unit_rows.html' %}
    </div>

  </div>
</section>
{% endblock %}
