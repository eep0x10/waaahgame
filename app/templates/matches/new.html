{% extends "base.html" %}
{% block title %}Issue Challenge{% endblock %}

{% block content %}
<section class="armies-builder-section">
  <div class="container" style="max-width:600px;">
    <p class="eyebrow"><a href="{{ url_for('matches.index') }}">Lobby</a> &rsaquo; New Challenge</p>
    <h1 class="section-title">Issue Challenge</h1>

    <div class="card-form" style="padding:2rem;">
      <form method="POST" action="{{ url_for('matches.new_post') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-field">
          <label for="opponent_id">Opponent (accepted friends only)</label>
          <select id="opponent_id" name="opponent_id" required style="width:100%;padding:0.5rem;border:1px solid var(--border-gold);background:var(--bg-parchment-card);font-family:var(--font-body);font-size:1rem;">
            <option value="">— Select opponent —</option>
            {% for fs in current_user.sent_friend_requests %}
              {% if fs.status == 'accepted' %}
                <option value="{{ fs.addressee.id }}">{{ fs.addressee.name }}</option>
              {% endif %}
            {% endfor %}
            {% for fs in current_user.received_friend_requests %}
              {% if fs.status == 'accepted' %}
                <option value="{{ fs.requester.id }}">{{ fs.requester.name }}</option>
              {% endif %}
            {% endfor %}
          </select>
        </div>

        <div class="form-field">
          <label for="system_id">Game System</label>
          <select id="system_id" name="system_id" required style="width:100%;padding:0.5rem;border:1px solid var(--border-gold);background:var(--bg-parchment-card);font-family:var(--font-body);font-size:1rem;">
            <option value="">— Select system —</option>
            {% for sys in systems %}
              <option value="{{ sys.id }}">{{ sys.name }} ({{ sys.edition }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-field">
          <label for="format">Format</label>
          <select id="format" name="format" required style="width:100%;padding:0.5rem;border:1px solid var(--border-gold);background:var(--bg-parchment-card);font-family:var(--font-body);font-size:1rem;">
            {% for fmt in formats %}
              <option value="{{ fmt }}">{{ fmt | replace('_',' ') | title }} ({{ FORMAT_POINTS[fmt] }}pts)</option>
            {% endfor %}
          </select>
        </div>

        {# System-to-formats mapping for client-side filtering #}
        <script>
        (function() {
          var systemFormats = {{ system_formats | tojson }};
          var systemSelect = document.getElementById('system_id');
          var formatSelect = document.getElementById('format');
          var allFormats = {{ FORMAT_POINTS | tojson }};

          function buildSystemCodeMap() {
            // Map system option value (id) -> system code via data attribute
            var map = {};
            {% for sys in systems %}
            map["{{ sys.id }}"] = "{{ sys.code }}";
            {% endfor %}
            return map;
          }

          var sysCodeMap = buildSystemCodeMap();

          function updateFormats() {
            var sysId = systemSelect.value;
            var sysCode = sysCodeMap[sysId];
            var fmts = systemFormats[sysCode] || null;
            var prev = formatSelect.value;
            formatSelect.innerHTML = '';
            var fmtMap = fmts || allFormats;
            for (var key in fmtMap) {
              var opt = document.createElement('option');
              opt.value = key;
              var label = key.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
              opt.textContent = label + ' (' + fmtMap[key] + 'pts)';
              if (key === prev) opt.selected = true;
              formatSelect.appendChild(opt);
            }
          }

          systemSelect.addEventListener('change', updateFormats);
          if (systemSelect.value) updateFormats();
        })();
        </script>

        <div class="form-field">
          <label for="army_host_id">Your Army</label>
          <select id="army_host_id" name="army_host_id" required style="width:100%;padding:0.5rem;border:1px solid var(--border-gold);background:var(--bg-parchment-card);font-family:var(--font-body);font-size:1rem;">
            <option value="">— Select army —</option>
            {% for army in my_armies %}
              <option value="{{ army.id }}">{{ army.name }} ({{ army.faction.name }}, {{ army.points_limit }}pts)</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-field">
          <label for="battlepack_id">Mission / Battlepack <span style="opacity:0.5;font-size:0.85rem;">(optional)</span></label>
          <select id="battlepack_id" name="battlepack_id" style="width:100%;padding:0.5rem;border:1px solid var(--border-gold);background:var(--bg-parchment-card);font-family:var(--font-body);font-size:1rem;">
            <option value="">— None —</option>
            {% for bp in battlepacks_db %}
              <option value="{{ bp.id }}" data-system-id="{{ bp.system_id }}" data-format="{{ bp.format }}">
                {{ bp.name }} ({{ bp.format | replace('_',' ') | title }})
              </option>
            {% endfor %}
          </select>
        </div>
        <script>
        (function() {
          var bpSelect = document.getElementById('battlepack_id');
          var fmtSelect = document.getElementById('format');
          var sysSelect = document.getElementById('system_id');
          {% for bp in battlepacks_db %}
          {% endfor %}
          var bpSystemMap = {};
          {% for bp in battlepacks_db %}
          bpSystemMap[{{ bp.id }}] = { system_id: {{ bp.system_id }}, format: "{{ bp.format }}" };
          {% endfor %}

          function filterBattlepacks() {
            var sysId = parseInt(sysSelect.value) || 0;
            var fmt = fmtSelect.value;
            var opts = bpSelect.options;
            for (var i = 1; i < opts.length; i++) {
              var bp = bpSystemMap[parseInt(opts[i].value)];
              var show = (!sysId || bp.system_id === sysId) && (!fmt || bp.format === fmt);
              opts[i].style.display = show ? '' : 'none';
            }
            if (bpSelect.selectedOptions[0] && bpSelect.selectedOptions[0].style.display === 'none') {
              bpSelect.value = '';
            }
          }

          sysSelect.addEventListener('change', filterBattlepacks);
          fmtSelect.addEventListener('change', filterBattlepacks);
          filterBattlepacks();
        })();
        </script>

        <div class="modal-actions">
          <button type="submit" class="btn-primary">Issue Challenge</button>
          <a href="{{ url_for('matches.index') }}" class="btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
