<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100" height="40" fill="none">
  <!-- Mirror of flourish-left via transform -->
  <!-- Main horizontal stem -->
  <path d="M95,20 C85,20 80,20 70,20" stroke="#b8935a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Upper vine curl -->
