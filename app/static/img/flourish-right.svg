  <!-- Leaf tip lower -->
  <path d="M15,30 C10,32 4,31 2,28 C4,26 10,27 15,30" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Small curl lower branch -->
  <path d="M45,27 C43,32 38,34 35,31 C37,27 42,27 45,27" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Dot accents -->
  <circle cx="90" cy="20" r="1.5" fill="#b8935a" opacity="0.7"/>
  <circle cx="80" cy="20" r="1" fill="#b8935a" opacity="0.5"/>
</svg>
