  <!-- Tip stem continuation -->
  <path d="M58,16 C50,12 42,14 35,12 C28,10 22,8 15,10" stroke="#b8935a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Small leaf tip upper -->
  <path d="M15,10 C10,8 4,9 2,12 C4,14 10,13 15,10" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Small curl branch upper -->
  <path d="M45,13 C43,8 38,6 35,9 C37,13 42,13 45,13" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Small curl branch from lower -->
