<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f4e8d5"/>
  <!-- Outer gold border -->
  <rect x="6" y="6" width="388" height="388" fill="none" stroke="#d4af37" stroke-width="3"/>
  <!-- Inner gold border -->
  <rect x="14" y="14" width="372" height="372" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Corner ornaments -->
  <circle cx="20" cy="20" r="4" fill="#d4af37"/>
  <circle cx="380" cy="20" r="4" fill="#d4af37"/>
  <circle cx="20" cy="380" r="4" fill="#d4af37"/>
  <circle cx="380" cy="380" r="4" fill="#d4af37"/>
  <!-- Faction sigil -->
  <text x="200" y="130" font-family="serif" font-size="64" fill="#d4af37" text-anchor="middle" opacity="0.55">☘</text>
  <!-- Faction name -->
  <text x="200" y="175" font-family="Garamond,'Times New Roman',serif" font-size="13" fill="#1a3a5c" text-anchor="middle" letter-spacing="2">SYLVANETH</text>
  <!-- Divider -->
  <line x1="60" y1="187" x2="340" y2="187" stroke="#d4af37" stroke-width="1"/>
  <!-- Unit name -->
  <text x="200" y="245" font-family="Garamond,'Times New Roman',serif" font-size="16" fill="#1a3a5c" text-anchor="middle" font-weight="bold">Treelord</text>
  <!-- Bottom label -->
  <text x="200" y="360" font-family="Garamond,'Times New Roman',serif" font-size="11" fill="#1a3a5c" text-anchor="middle" opacity="0.6" letter-spacing="1">NO ART AVAILABLE</text>
  <!-- Bottom divider -->
  <line x1="60" y1="345" x2="340" y2="345" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
</svg>