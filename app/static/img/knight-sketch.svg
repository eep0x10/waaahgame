<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" fill="none" opacity="0.45">
  <!-- Castle tower left -->
  <rect x="20" y="160" width="60" height="180" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Tower battlements left -->
  <rect x="20" y="145" width="12" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="38" y="145" width="12" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="56" y="145" width="12" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Tower window left -->
  <path d="M38,195 L38,178 C38,172 42,168 50,168 C58,168 62,172 62,178 L62,195 Z" stroke="#8a6a3a" stroke-width="1.2"/>

  <!-- Castle tower right -->
  <rect x="220" y="160" width="60" height="180" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Tower battlements right -->
  <rect x="220" y="145" width="12" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="238" y="145" width="12" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="256" y="145" width="12" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Tower window right -->
  <path d="M238,195 L238,178 C238,172 242,168 250,168 C258,168 262,172 262,178 L262,195 Z" stroke="#8a6a3a" stroke-width="1.2"/>

  <!-- Central keep -->
  <rect x="95" y="120" width="110" height="220" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Keep battlements -->
  <rect x="95" y="104" width="15" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="118" y="104" width="15" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="141" y="104" width="15" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="164" y="104" width="15" height="20" stroke="#8a6a3a" stroke-width="1.5"/>
  <rect x="187" y="104" width="15" height="20" stroke="#8a6a3a" stroke-width="1.5"/>

  <!-- Keep main window arched -->
  <path d="M128,175 L128,150 C128,140 135,134 150,134 C165,134 172,140 172,150 L172,175 Z" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Window arch detail -->
  <path d="M138,155 C138,148 150,142 150,142 C150,142 162,148 162,155" stroke="#8a6a3a" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Gate arch -->
  <path d="M128,340 L128,290 C128,275 135,268 150,268 C165,268 172,275 172,290 L172,340" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Portcullis lines -->
  <line x1="135" y1="290" x2="135" y2="340" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="145" y1="290" x2="145" y2="340" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="155" y1="290" x2="155" y2="340" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="165" y1="290" x2="165" y2="340" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="128" y1="300" x2="172" y2="300" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="128" y1="315" x2="172" y2="315" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="128" y1="328" x2="172" y2="328" stroke="#8a6a3a" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Connecting wall left -->
  <rect x="80" y="230" width="20" height="110" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- Connecting wall right -->
  <rect x="200" y="230" width="20" height="110" stroke="#8a6a3a" stroke-width="1.5"/>

  <!-- Banner pole on keep -->
  <line x1="150" y1="104" x2="150" y2="60" stroke="#8a6a3a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Banner flag -->
  <path d="M150,62 C158,64 170,68 170,72 C170,76 158,78 150,78 Z" stroke="#8a6a3a" stroke-width="1.2" fill="none"/>
  <!-- Banner symbol - small cross -->
  <line x1="157" y1="68" x2="163" y2="68" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="160" y1="65" x2="160" y2="72" stroke="#8a6a3a" stroke-width="1"/>

  <!-- Ground baseline with rough stroke -->
  <path d="M0,340 C30,338 60,342 90,340 C120,338 150,342 180,340 C210,338 240,342 270,340 C285,339 295,340 300,340" stroke="#8a6a3a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Decorative stone texture hints on keep -->
  <line x1="95" y1="145" x2="205" y2="145" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
  <line x1="95" y1="170" x2="205" y2="170" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
  <line x1="95" y1="210" x2="205" y2="210" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
  <line x1="95" y1="245" x2="205" y2="245" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>

  <!-- Stone texture left tower -->
  <line x1="20" y1="195" x2="80" y2="195" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
  <line x1="20" y1="225" x2="80" y2="225" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
  <!-- Stone texture right tower -->
  <line x1="220" y1="195" x2="280" y2="195" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
  <line x1="220" y1="225" x2="280" y2="225" stroke="#8a6a3a" stroke-width="0.6" opacity="0.5"/>
</svg>
