<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100" height="40" fill="none">
  <!-- Main horizontal stem -->
  <path d="M5,20 C15,20 20,20 30,20" stroke="#b8935a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Upper vine curl -->
  <path d="M30,20 C38,20 42,14 38,10 C34,6 28,10 32,16 C34,19 38,19 42,16" stroke="#b8935a" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Lower vine curl -->
