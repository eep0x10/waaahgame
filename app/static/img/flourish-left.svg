  <!-- Tip stem continuation -->
  <path d="M42,16 C50,12 58,14 65,12 C72,10 78,8 85,10" stroke="#b8935a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Small leaf tip upper -->
  <path d="M85,10 C90,8 96,9 98,12 C96,14 90,13 85,10" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Small curl branch upper -->
  <path d="M55,13 C57,8 62,6 65,9 C63,13 58,13 55,13" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Small curl branch from lower -->
  <path d="M42,24 C50,28 58,26 65,28 C72,30 78,32 85,30" stroke="#b8935a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Leaf tip lower -->
  <path d="M85,30 C90,32 96,31 98,28 C96,26 90,27 85,30" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Small curl lower branch -->
  <path d="M55,27 C57,32 62,34 65,31 C63,27 58,27 55,27" stroke="#b8935a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Dot accents -->
  <circle cx="10" cy="20" r="1.5" fill="#b8935a" opacity="0.7"/>
  <circle cx="20" cy="20" r="1" fill="#b8935a" opacity="0.5"/>
</svg>
